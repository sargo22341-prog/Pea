services:
  pea-portfolio:
    image: ghcr.io/sargo22341-prog/pea-portfolio:latest
    environment:
      LOGO_DEV_API_KEY: # Cle api LOGO DEV public
      TZ: Europe/Paris
      PUBLIC_URL: # Url
      TRUST_PROXY: true
    volumes:
      - /data:/app/data
    ports:
      - "4000:4000"
    restart: unless-stopped
