name: Build Docker and Android

on:
  push:
  workflow_dispatch:

env:
  IMAGE_NAME: pea-portfolio
  REGISTRY: ghcr.io/${{ github.repository_owner }}
  DOCKER_API_VERSION: "1.43"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release-version:
    name: Compute release version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_code: ${{ steps.version.outputs.version_code }}
      image: ${{ steps.version.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Compute available version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BASE_VERSION=$(node -p "require('./package.json').version")
          IMAGE="${REGISTRY}/${IMAGE_NAME}"

          for N in $(seq 0 100); do
            if [ "$N" = "0" ]; then
              CANDIDATE="$BASE_VERSION"
            else
              CANDIDATE="${BASE_VERSION}-${N}"
            fi

            DOCKER_EXISTS=0
            docker manifest inspect "${IMAGE}:${CANDIDATE}" >/dev/null 2>&1 && DOCKER_EXISTS=1

            RELEASE_EXISTS=0
            gh release view "v${CANDIDATE}" >/dev/null 2>&1 && RELEASE_EXISTS=1

            if [ "$DOCKER_EXISTS" = "0" ] && [ "$RELEASE_EXISTS" = "0" ]; then
              VERSION="$CANDIDATE"
              break
            fi
          done

          if [ -z "${VERSION:-}" ]; then
            echo "Unable to find a free version for ${BASE_VERSION} after 100 attempts." >&2
            exit 1
          fi

          VERSION_CODE=$(node -e "
            const version = process.argv[1];
            const match = version.match(/^(\\d+)\\.(\\d+)\\.(\\d+)(?:-(\\d+))?$/);
            if (!match) process.exit(1);
            const major = Number(match[1]);
            const minor = Number(match[2]);
            const patch = Number(match[3]);
            const suffix = Number(match[4] ?? '0');
            if ([major, minor, patch, suffix].some((n) => !Number.isInteger(n)) || minor > 99 || patch > 99 || suffix > 99) process.exit(1);
            console.log(major * 1000000 + minor * 10000 + patch * 100 + suffix);
          " "$VERSION")

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "version_code=${VERSION_CODE}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

  docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs:
      - release-version
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm

      - name: Check Node
        run: |
          node -v
          npm -v

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Backend tests
        run: npm test -w backend

      - name: Frontend tests
        run: npm test -w frontend

      - name: Build app
        run: npm run build

      - name: Compute Docker tags
        id: meta
        run: |
          VERSION="${{ needs.release-version.outputs.version }}"
          IMAGE="${{ needs.release-version.outputs.image }}"
          SHORT_SHA="${GITHUB_SHA::7}"
          TAGS="${IMAGE}:${VERSION},${IMAGE}:sha-${SHORT_SHA}"

          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            TAGS="${TAGS},${IMAGE}:latest"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker
          driver-opts: network=host

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.title=PEA Portfolio
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

  android:
    name: Build signed Android APK
    runs-on: ubuntu-latest
    needs:
      - release-version
      - docker
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm

      - name: Check Java and Android
        run: |
          java -version
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build -w shared

      - name: Build Android web assets
        run: npm run build:android -w frontend

      - name: Restore Android keystore
        working-directory: frontend/android
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > pea-release.keystore

      - name: Make Gradle wrapper executable
        working-directory: frontend/android
        run: chmod +x ./gradlew

      - name: Build signed release APK
        working-directory: frontend/android
        run: ./gradlew assembleRelease
        env:
          ANDROID_VERSION_NAME: ${{ needs.release-version.outputs.version }}
          ANDROID_VERSION_CODE: ${{ needs.release-version.outputs.version_code }}
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/frontend/android/pea-release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Verify signed APK version
        run: |
          VERSION="${{ needs.release-version.outputs.version }}"
          VERSION_CODE="${{ needs.release-version.outputs.version_code }}"
          APK_SOURCE="frontend/android/app/build/outputs/apk/release/app-release.apk"
          AAPT=$(find "$ANDROID_HOME/build-tools" -name aapt -type f | sort -V | tail -n 1)
          BADGING=$("$AAPT" dump badging "$APK_SOURCE")

          echo "$BADGING" | grep "versionName='$VERSION'"
          echo "$BADGING" | grep "versionCode='$VERSION_CODE'"
          echo "APK versionName=$VERSION"
          echo "APK versionCode=$VERSION_CODE"

      - name: Rename APK
        id: apk
        run: |
          VERSION="${{ needs.release-version.outputs.version }}"
          SHORT_SHA="${GITHUB_SHA::7}"
          APK_SOURCE="frontend/android/app/build/outputs/apk/release/app-release.apk"
          APK_TARGET="pea-portfolio-${VERSION}-sha-${SHORT_SHA}.apk"

          cp "$APK_SOURCE" "$APK_TARGET"

          echo "apk_name=$APK_TARGET" >> "$GITHUB_OUTPUT"
          echo "apk_path=$APK_TARGET" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.apk_name }}
          path: ${{ steps.apk.outputs.apk_path }}
